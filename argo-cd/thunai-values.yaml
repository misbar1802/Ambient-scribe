# thunai dev override for Argo CD on AWS EKS.
# Bitbucket webhook: SM secret bb-webhook-secret can be wired to configs.secret.bitbucketUUID (Helm) when enabling
# Bitbucket webhooks — inject via CI/CD, do not commit. See Argo docs: operator-manual/webhook/
#
# Derived from the Terraform environment:
# - cluster: thunai-dev

nameOverride: argocd
namespaceOverride: argocd

global:
  domain: argocd-dev.thunai.ai

configs:
  cm:
    admin.enabled: true
  params:
    server.insecure: false

# No SSO details exist in the current Terraform stack, so keep Dex off for now.
dex:
  enabled: false

# Keep the default single Redis deployment for a lean NP install.
redis:
  enabled: true

redis-ha:
  enabled: false

server:
  replicas: 1

  # ALB terminates TLS externally; the pod only needs to speak plain HTTP.
  # Without this flag, ArgoCD expects its own TLS cert and ALB health checks fail.
  extraArgs:
    - --insecure

  service:
    type: NodePort
    annotations: {}
  ingress:
    enabled: true
    controller: aws
    ingressClassName: alb
    hostname: argocd-dev.thunai.ai
    defaultBackend:
      service:
        name: argocd-server
        port:
          number: 80
    annotations:
      kubernetes.io/ingress.class: "alb"
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: instance
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:253490767737:certificate/35207568-176f-4ce8-a05d-404acc2a2c14
    aws:
      serviceType: NodePort
  serviceAccount:
    create: true
    name: argocd-server

controller:
  replicas: 1
  serviceAccount:
    create: true
    name: argocd-application-controller

repoServer:
  replicas: 1
  serviceAccount:
    create: true
    name: argocd-repo-server

applicationSet:
  replicas: 1
  serviceAccount:
    create: true
    name: argocd-applicationset-controller

notifications:
  enabled: true
  serviceAccount:
    create: true
    name: argocd-notifications-controller

# Metrics can be enabled later if/when Prometheus scraping is wired up for this cluster.
# Trigger note (2026-04-16): kick Cloud Build for Argo CD deploy (argo-cd/** path filter).
